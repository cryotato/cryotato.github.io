<script type="module">
  import { animate, scrambleText } from 'https://esm.sh/animejs';

  const observerOptions = {
    root: null,
    rootMargin: '0px',
    threshold: 0.1
  };

  const observer = new IntersectionObserver((entries, observer) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const el = entry.target;

        animate(el, {
          innerHTML: scrambleText({
            duration: 750,
            settleDuration: 250,
            perturbation: 0.2,
            cursor: '░▒▓█'
          })
        });

        observer.unobserve(el);
      }
    });
  }, observerOptions);

  document.addEventListener('DOMContentLoaded', () => {
    // 1. Find all title and subtitle containers
    const containers = document.querySelectorAll('.page__title, .page__lead, .archive__item-title');
    
    containers.forEach(container => {
      // 2. Check if this specific container has a link inside it
      const linkInside = container.querySelector('a');
      
      // 3. If there is a link, target the link. If not, target the container itself.
      const targetElement = linkInside ? linkInside : container;
      
      // 4. Observe the correct element
      observer.observe(targetElement);
      
      // OPTIONAL hover effect - updated to use the correct target as well
      /*
      targetElement.addEventListener('pointerenter', () => {
         animate(targetElement, { innerHTML: scrambleText({ duration: 500, perturbation: 0.2, cursor: '░▒▓█' }) });
      });
      */
    });
  });
</script>
