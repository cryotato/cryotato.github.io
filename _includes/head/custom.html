<script type="module">
  import { animate, scrambleText } from 'https://esm.sh/animejs';

  // 1. HELPER: Finds pure text inside an element without destroying HTML/links
  function wrapSafeTextNodes(element) {
    const spans = [];
    // TreeWalker safely scans through the DOM looking ONLY at Text Nodes
    const walker = document.createTreeWalker(element, NodeFilter.SHOW_TEXT, null, false);
    const textNodes = [];
    
    let node;
    while ((node = walker.nextNode())) {
      // Only grab text that actually contains characters (ignore empty formatting space)
      if (node.nodeValue.trim() !== '') {
        textNodes.push(node);
      }
    }
    
    // Wrap every safe text node in an invisible <span>
    textNodes.forEach(textNode => {
      const span = document.createElement('span');
      span.textContent = textNode.nodeValue;
      span.classList.add('scramble-target');
      textNode.parentNode.replaceChild(span, textNode);
      spans.push(span);
    });
  }

  // 2. Set up the Intersection Observer
  const observerOptions = {
    root: null,
    rootMargin: '0px',
    threshold: 0.1
  };

  const observer = new IntersectionObserver((entries, observer) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const container = entry.target;
        
        // Find the safe spans we created and ONLY animate those
        const textSpans = container.querySelectorAll('.scramble-target');
        
        textSpans.forEach(span => {
          animate(span, {
            innerHTML: scrambleText({
              duration: 750,
              settleDuration: 250,
              perturbation: 0.2,
              cursor: '░▒▓█'
            })
          });
        });

        observer.unobserve(container);
      }
    });
  }, observerOptions);

  // 3. Initialize everything when the page loads
  document.addEventListener('DOMContentLoaded', () => {
    // Grab all titles and subtitles
    const containers = document.querySelectorAll('.page__title, .page__lead, .archive__item-title');
    
    containers.forEach(container => {
      // Pre-process the container to protect links
      wrapSafeTextNodes(container);
      
      // Observe the overall container
      observer.observe(container);
      
      // OPTIONAL hover effect (uncomment to use)
      /*
      container.addEventListener('pointerenter', () => {
        const textSpans = container.querySelectorAll('.scramble-target');
        textSpans.forEach(span => {
          animate(span, { innerHTML: scrambleText({ duration: 500, perturbation: 0.2, cursor: '░▒▓█' }) });
        });
      });
      */
    });
  });
</script>
