<script type="module">
  import { animate, scrambleText } from 'https://esm.sh/animejs';

  const observerOptions = {
    root: null,
    rootMargin: '0px',
    // 0.1 means trigger when 10% of the header is visible
    threshold: 0.1
  };

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      // When the header scrolls INTO view
      if (entry.isIntersecting) {
        animate(entry.target, {
          innerHTML: scrambleText({
            duration: 750,
            settleDuration: 250,
            perturbation: 0.2,
            cursor: '░▒▓█'
          })
        });
        
        // Notice we REMOVED observer.unobserve(el) here!
        // Now it will trigger again next time you scroll to it.
      }
    });
  }, observerOptions);

  document.addEventListener('DOMContentLoaded', () => {
    // 1. Grab ALL headers (H1 through H6) plus your page leads
    const headers = document.querySelectorAll('h1, h2, h3, h4, h5, h6, .page__lead');
    
    // 2. Tell the observer to watch every single one of them
    headers.forEach(header => {
      observer.observe(header);
      
      // OPTIONAL hover effect (uncomment to use)
      /*
      header.addEventListener('pointerenter', () => {
         animate(header, { innerHTML: scrambleText({ duration: 500, perturbation: 0.2, cursor: '░▒▓█' }) });
      });
      */
    });
  });
</script>
