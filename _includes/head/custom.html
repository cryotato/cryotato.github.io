<script type="module">
  // Import ONLY the necessary animation functions from Anime.js
  import { animate, scrambleText } from 'https://esm.sh/animejs';

  // 1. Setup the Intersection Observer (detects when elements appear on screen)
  const observerOptions = {
    root: null,
    rootMargin: '0px',
    threshold: 0.1 // Triggers when 10% of the element is visible
  };

  const observer = new IntersectionObserver((entries, observer) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const el = entry.target;

        // 2. Run the scramble animation
        animate(el, {
          innerHTML: scrambleText({
            duration: 750,
            settleDuration: 250,
            perturbation: 0.2,
            cursor: '░▒▓█',
            // You can add other options here like chars: 'lowercase' 
          })
        });

        // 3. Stop observing so it only happens the *first* time it appears
        observer.unobserve(el);
      }
    });
  }, observerOptions);

  // 4. Wait for the DOM to load, then find the titles and observe them
  document.addEventListener('DOMContentLoaded', () => {
    // These are standard Minimal Mistakes classes for titles and subtitles.
    // Add or remove CSS selectors here based on what you want to animate.
    const targets = document.querySelectorAll('.page__title, .page__lead, .archive__item-title');
    
    targets.forEach(target => {
      observer.observe(target);
      
      // OPTIONAL: Uncomment the lines below if you also want the effect to happen when users hover over the titles
      /*
      target.addEventListener('pointerenter', () => {
         animate(target, { innerHTML: scrambleText({ duration: 500, perturbation: 0.2, cursor: '░▒▓█' }) });
      });
      */
    });
  });
</script>
